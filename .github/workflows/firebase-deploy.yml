name: Deploy to Firebase on Push

on:
  push:
    branches:
      - main
      - master  # รองรับทั้งคนที่ใช้กิ่ง main และ master ไม่ต้องกังวลเรื่องชื่อกิ่งอีกต่อไป

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install Functions Dependencies
        run: |
          cd functions
          npm ci || npm install  # บังคับติดตั้ง Library ระบบหลังบ้านให้สมบูรณ์

      - name: Deploy to Firebase Hosting & Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
